services:
  codebuddy2api:
    image: ghcr.io/iceean/codebuddy2api:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # 容器运行数据必须写入持久化挂载点，不接受 .env 覆盖。
      CODEBUDDY_DATA_DIR: /app/data
    volumes:
      # SQLite 与 CodeBuddy 凭证持久化
      - ./data:/app/data
      # 多用户认证目录；服务只读，add-user 命令使用单独的可写挂载。
      - ./secrets:/app/secrets:ro
    env_file:
      - path: .env
        required: false
