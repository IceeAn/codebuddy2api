version: '3.8'

services:
  codebuddy2api:
    build: .
    image: iceean/codebuddy2api:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      # 配置持久化
      - ./config:/app/config
      # 凭证持久化
      - ./.codebuddy_creds:/app/.codebuddy_creds
      # 多用户认证文件
      - ./secrets/users.txt:/app/secrets/users.txt:ro
    env_file:
      - .env
