services:
  codebuddy2api:
    build: .
    image: iceean/codebuddy2api:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # 容器数据库必须写入持久化挂载点，不接受 .env 覆盖。
      CODEBUDDY_DATA_DIR: /app/data
    volumes:
      # SQLite 数据持久化
      - ./data:/app/data
      # CodeBuddy 凭证持久化
      - ./.codebuddy_creds:/app/.codebuddy_creds
      # 多用户认证文件
      - ./secrets/users.txt:/app/secrets/users.txt:ro
    env_file:
      - .env
